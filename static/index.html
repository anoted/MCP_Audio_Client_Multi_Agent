<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NIM Audio Client</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">🎙️</span>
      <div>
        <h1>NIM Audio Client</h1>
        <div class="sub" id="model-info">connecting…</div>
      </div>
    </div>
    <div class="header-right">
      <span id="conn-dot" class="dot off" title="WebSocket"></span>
      <span id="status-pill" class="pill">connecting</span>
      <button id="reset-btn" class="ghost" title="Clear conversation">Reset</button>
    </div>
  </header>

  <main>
    <section id="chat-wrap">
      <div id="chat">
        <div class="notice">
          Click the microphone to start talking. Speaking while the assistant is
          talking interrupts it (barge-in). You can also type below.
        </div>
      </div>
    </section>

    <aside id="mcp-panel">
      <h2>MCP Servers</h2>
      <div id="mcp-list" class="mcp-list"></div>
      <form id="mcp-form" autocomplete="off">
        <h3>Register server</h3>
        <input id="mcp-name" placeholder="name (e.g. demo)" required
               pattern="[a-zA-Z0-9_\-]{1,32}">
        <select id="mcp-transport">
          <option value="stdio">stdio (local command)</option>
          <option value="http">streamable HTTP</option>
          <option value="sse">SSE</option>
        </select>
        <input id="mcp-command" placeholder="command, e.g. python examples/demo_mcp_server.py">
        <input id="mcp-url" placeholder="url, e.g. http://localhost:9000/mcp" class="hidden">
        <button type="submit">Add & connect</button>
        <div id="mcp-error" class="form-error"></div>
      </form>
    </aside>
  </main>

  <footer>
    <button id="mic-btn" title="Start/stop microphone">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
    </button>
    <div id="vad-meter"><div id="vad-fill"></div></div>
    <input id="text-input" placeholder="Type a message (Enter to send)…">
    <button id="send-btn">Send</button>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
